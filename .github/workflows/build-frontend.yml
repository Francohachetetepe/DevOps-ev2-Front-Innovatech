name: Build & Push Frontend (Docker Hub)

on:
  push:
    branches: ["deploy"]

permissions:
  contents: read

env:
  DOCKERHUB_NAMESPACE: frarcem
  FRONT_IMAGE: front-innovatech

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" \
          | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Generar versión
        id: tags
        run: |
          VERSION="1.0.${GITHUB_RUN_NUMBER}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build y Push frontend
        run: |
          IMAGE="${DOCKERHUB_NAMESPACE}/${FRONT_IMAGE}"

          docker build \
          -t "${IMAGE}:${{ steps.tags.outputs.VERSION }}" \
          -t "${IMAGE}:latest" \
          .

          docker push "${IMAGE}:${{ steps.tags.outputs.VERSION }}"
          docker push "${IMAGE}:latest"